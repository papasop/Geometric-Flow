name: Update quotes

on:
  schedule:
    - cron: "20 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade yfinance pandas

      - name: Generate quotes
        run: python docs/fetch_quotes.py

      - name: Commit updated quotes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily quotes"
          file_pattern: docs/quotes.json docs/agi/quotes.json docs/ai-global-index/quotes.json

      - name: Publish quotes to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/agi-gh-pages origin/gh-pages
          cp docs/quotes.json /tmp/agi-gh-pages/quotes.json
          mkdir -p /tmp/agi-gh-pages/agi /tmp/agi-gh-pages/ai-global-index
          cp docs/agi/quotes.json /tmp/agi-gh-pages/agi/quotes.json
          cp docs/ai-global-index/quotes.json /tmp/agi-gh-pages/ai-global-index/quotes.json
          cd /tmp/agi-gh-pages
          git add quotes.json agi/quotes.json ai-global-index/quotes.json
          git commit -m "Update daily quotes" || exit 0
          git push origin HEAD:gh-pages
