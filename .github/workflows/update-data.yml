name: Update market data

"on":
  workflow_dispatch:
  schedule:
    # A-share / HK close refresh: after Shanghai/Shenzhen 15:00 and HK 16:00 local.
    - cron: "30 9 * * 1-5"
    # US close refresh: safely after regular US market close in both DST and standard time.
    - cron: "30 22 * * 1-5"
    # Daily backfill refresh for late Yahoo updates, holidays, and failed prior runs.
    - cron: "30 3 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance pandas

      - name: Generate data.json
        run: |
          END_DATE="$(python - <<'PY'
          from datetime import date, timedelta
          print((date.today() + timedelta(days=1)).isoformat())
          PY
          )"
          python docs/fetch_data.py --start 2022-11-30 --end "$END_DATE" --out docs/data.json

      - name: Commit data to main
        id: commit_main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git commit -m "Update market data"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish data to gh-pages
        if: steps.commit_main.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/agi-gh-pages origin/gh-pages
          cp docs/data.json /tmp/agi-gh-pages/data.json
          cd /tmp/agi-gh-pages
          git add data.json
          if git diff --cached --quiet; then
            echo "No gh-pages data changes."
          else
            git commit -m "Publish market data update"
            git push origin HEAD:gh-pages
          fi
