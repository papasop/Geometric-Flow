name: Update AGI daily feeds

on:
  schedule:
    - cron: "20 8 * * *"
  workflow_dispatch:
    inputs:
      value:
        description: "Optional LLM Token Expenditure Index value for today"
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade yfinance pandas yt-dlp
      - name: Update stock quotes
        run: python docs/fetch_quotes.py
      - name: Update news feed
        env:
          TRANSLATE_NEWS_TITLES: "0"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python docs/fetch_news.py
      - name: Generate Mandarin video voiceovers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          VOICEOVER_MAX_VIDEOS: "6"
        run: python docs/fetch_video_voiceovers.py
      - name: Update token index
        env:
          TOKEN_INDEX_VALUE: ${{ github.event.inputs.value }}
        run: python docs/fetch_token_index.py
      - name: Update model rankings
        run: python docs/fetch_model_rankings.py
      - name: Commit updated feeds to main
        id: commit_main
        run: |
          FILES="docs/quotes.json docs/agi/quotes.json docs/ai-global-index/quotes.json docs/news.json docs/news-a8febb0.json docs/video-voiceover.json docs/audio/voiceovers docs/agi/news.json docs/agi/news-a8febb0.json docs/ai-global-index/news.json docs/ai-global-index/news-a8febb0.json docs/token-index.json docs/agi/token-index.json docs/ai-global-index/token-index.json docs/model-rankings.json docs/agi/model-rankings.json docs/ai-global-index/model-rankings.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Feeds already current"
          else
            git commit -m "Update AGI daily feeds"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish feeds to gh-pages
        if: steps.commit_main.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/agi-gh-pages origin/gh-pages
          cp docs/quotes.json /tmp/agi-gh-pages/quotes.json
          cp docs/news.json /tmp/agi-gh-pages/news.json
          cp docs/news-a8febb0.json /tmp/agi-gh-pages/news-a8febb0.json
          cp docs/video-voiceover.json /tmp/agi-gh-pages/video-voiceover.json
          mkdir -p /tmp/agi-gh-pages/audio/voiceovers
          cp -R docs/audio/voiceovers/. /tmp/agi-gh-pages/audio/voiceovers/ 2>/dev/null || true
          cp docs/token-index.json /tmp/agi-gh-pages/token-index.json
          cp docs/model-rankings.json /tmp/agi-gh-pages/model-rankings.json
          mkdir -p /tmp/agi-gh-pages/agi /tmp/agi-gh-pages/ai-global-index
          cp docs/agi/quotes.json /tmp/agi-gh-pages/agi/quotes.json
          cp docs/agi/news.json /tmp/agi-gh-pages/agi/news.json
          cp docs/agi/news-a8febb0.json /tmp/agi-gh-pages/agi/news-a8febb0.json
          cp docs/agi/token-index.json /tmp/agi-gh-pages/agi/token-index.json
          cp docs/agi/model-rankings.json /tmp/agi-gh-pages/agi/model-rankings.json
          cp docs/ai-global-index/quotes.json /tmp/agi-gh-pages/ai-global-index/quotes.json
          cp docs/ai-global-index/news.json /tmp/agi-gh-pages/ai-global-index/news.json
          cp docs/ai-global-index/news-a8febb0.json /tmp/agi-gh-pages/ai-global-index/news-a8febb0.json
          cp docs/ai-global-index/token-index.json /tmp/agi-gh-pages/ai-global-index/token-index.json
          cp docs/ai-global-index/model-rankings.json /tmp/agi-gh-pages/ai-global-index/model-rankings.json
          cd /tmp/agi-gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quotes.json news.json news-a8febb0.json video-voiceover.json audio/voiceovers token-index.json model-rankings.json agi/quotes.json agi/news.json agi/news-a8febb0.json agi/token-index.json agi/model-rankings.json ai-global-index/quotes.json ai-global-index/news.json ai-global-index/news-a8febb0.json ai-global-index/token-index.json ai-global-index/model-rankings.json
          git commit -m "Publish AGI daily feeds" || exit 0
          git push origin HEAD:gh-pages
