name: Update Token Cost Chart

on:
  schedule:
    - cron: "20 8 * * *"
  workflow_dispatch:
    inputs:
      value:
        description: "Optional LLM Token Expenditure Index value for today"
        required: false

permissions:
  contents: write

jobs:
  update-token-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update token index feed
        env:
          TOKEN_INDEX_VALUE: ${{ github.event.inputs.value }}
        run: python Entropy-AI/docs/fetch_token_index.py
      - name: Commit updated feed
        run: |
          if git diff --quiet -- Entropy-AI/docs/token-index.json Entropy-AI/docs/agi/token-index.json Entropy-AI/docs/ai-global-index/token-index.json; then
            echo "Token index already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Entropy-AI/docs/token-index.json Entropy-AI/docs/agi/token-index.json Entropy-AI/docs/ai-global-index/token-index.json
          git commit -m "Update token cost chart feed"
          git push
