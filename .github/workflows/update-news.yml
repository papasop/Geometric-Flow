name: Update news every 15 minutes

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install voiceover dependencies
        run: python -m pip install --upgrade yt-dlp
      - name: Update news feed
        env:
          TRANSLATE_NEWS_TITLES: "0"
          TAVILY_MAX_QUERIES: "0"
        run: python docs/fetch_news.py
      - name: Update talent flow graph
        if: false
        run: echo "Tavily-backed talent flow updates are disabled."
      - name: Generate Mandarin video voiceovers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          VOICEOVER_MAX_VIDEOS: "6"
        run: python docs/fetch_video_voiceovers.py
      - name: Commit updated news to main
        id: commit_main
        run: |
          FILES="docs/news.json docs/news-a8febb0.json docs/talent-flows.json docs/video-voiceover.json docs/audio/voiceovers docs/agi/news.json docs/agi/news-a8febb0.json docs/agi/talent-flows.json docs/ai-global-index/news.json docs/ai-global-index/news-a8febb0.json docs/ai-global-index/talent-flows.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "News already current"
          else
            git commit -m "Update news feed"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish news to gh-pages
        if: steps.commit_main.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/agi-gh-pages-news origin/gh-pages
          cp docs/news.json /tmp/agi-gh-pages-news/news.json
          cp docs/news-a8febb0.json /tmp/agi-gh-pages-news/news-a8febb0.json
          cp docs/talent-flows.json /tmp/agi-gh-pages-news/talent-flows.json
          cp docs/video-voiceover.json /tmp/agi-gh-pages-news/video-voiceover.json
          mkdir -p /tmp/agi-gh-pages-news/audio/voiceovers
          cp -R docs/audio/voiceovers/. /tmp/agi-gh-pages-news/audio/voiceovers/ 2>/dev/null || true
          mkdir -p /tmp/agi-gh-pages-news/agi /tmp/agi-gh-pages-news/ai-global-index
          cp docs/agi/news.json /tmp/agi-gh-pages-news/agi/news.json
          cp docs/agi/news-a8febb0.json /tmp/agi-gh-pages-news/agi/news-a8febb0.json
          cp docs/agi/talent-flows.json /tmp/agi-gh-pages-news/agi/talent-flows.json
          cp docs/ai-global-index/news.json /tmp/agi-gh-pages-news/ai-global-index/news.json
          cp docs/ai-global-index/news-a8febb0.json /tmp/agi-gh-pages-news/ai-global-index/news-a8febb0.json
          cp docs/ai-global-index/talent-flows.json /tmp/agi-gh-pages-news/ai-global-index/talent-flows.json
          cd /tmp/agi-gh-pages-news
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json news-a8febb0.json talent-flows.json video-voiceover.json audio/voiceovers agi/news.json agi/news-a8febb0.json agi/talent-flows.json ai-global-index/news.json ai-global-index/news-a8febb0.json ai-global-index/talent-flows.json
          git commit -m "Publish news feed" || exit 0
          git push origin HEAD:gh-pages
